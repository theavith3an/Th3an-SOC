# /etc/nginx/sites-available/thean-soc
# Save to: /etc/nginx/sites-available/thean-soc
# Enable: sudo ln -s /etc/nginx/sites-available/thean-soc /etc/nginx/sites-enabled/
# Test:   sudo nginx -t
# Reload: sudo systemctl reload nginx

# Rate limiting zones (put in http {} block in nginx.conf)
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/m;
# limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Block common attack paths immediately
    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|conf|bak|backup|swp|tar|gz)$ {
        return 444;
    }
    location ~ /\. { return 444; }

    # ACME challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (Let's Encrypt via certbot) ────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # Strong TLS settings — disable old protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options              "DENY" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header X-XSS-Protection             "1; mode=block" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # Hide nginx version
    server_tokens off;

    # ── Request size limits ─────────────────────────────────────────────────────
    client_max_body_size 64k;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 8k;

    # ── Timeouts ────────────────────────────────────────────────────────────────
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # ── Rate limiting ───────────────────────────────────────────────────────────
    limit_conn conn_limit 10;
    limit_req zone=api_limit burst=20 nodelay;

    # ── Block scanners and bad paths ────────────────────────────────────────────
    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|conf|bak|backup|swp|tar|gz|zip|rar)$ {
        return 444;
    }
    location ~ /\. { return 444; }
    location ~* /(wp-admin|wp-login|phpmyadmin|admin\.php|shell\.php|c99|r57|xmlrpc|\.well-known/security) {
        return 444;
    }

    # Block bad user agents (scrapers, scanners)
    if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|nuclei|acunetix|burpsuite|nessus|w3af|dirbuster|gobuster|ffuf|wfuzz)) {
        return 444;
    }

    # ── Login endpoint — extra tight rate limit ─────────────────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── All other API routes ────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_buffering on;
        proxy_buffer_size 8k;
    }

    # ── Main app ────────────────────────────────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Logging ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/thean_access.log;
    error_log  /var/log/nginx/thean_error.log warn;
}
